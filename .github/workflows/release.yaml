name: Release

on:
  schedule:
    # Run monthly on the 3rd at midnight UTC
    - cron: '0 0 3 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave empty for auto-generated date tag)'
        required: false
        type: string

env:
  NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
  NCBI_MAIL: ${{ secrets.NCBI_MAIL }}
  TRANSFORMS: "transform"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run pipeline
        run: just run

      - name: Postprocess
        run: just postprocess

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated monthly release of NCBI Gene ingest data.

            ## Transforms included
            - transform (NCBI Gene)

            ## Output
            - Gene nodes with postprocessed files split by taxon
          draft: false
          prerelease: false
          files: |
            output/*_nodes.tsv
            output/*_edges.tsv
            output/*.nt.gz
            output/by_taxon/*
